<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    /* Notre propre CSS autonome pour remplacer Tailwind */
    body { width: 320px; padding: 16px; font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
    h1 { font-size: 1.125rem; font-weight: bold; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-top: 0; }
    .hidden { display: none !important; }
    .flex-col { display: flex; flex-direction: column; gap: 12px; }
    input { border: 1px solid #cbd5e1; padding: 8px; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; outline: none; }
    input:focus { border-color: #2563eb; }
    button { background: #2563eb; color: white; border: none; padding: 8px; border-radius: 4px; font-weight: 500; cursor: pointer; width: 100%; transition: background 0.2s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #auth-section button { background: #1e293b; }
    #auth-section button:hover { background: #0f172a; }
    label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
    .box { background: white; padding: 12px; border-radius: 6px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .text-xs { font-size: 12px; color: #64748b; }
    .text-red { color: #ef4444; font-size: 12px; text-align: center; margin: 0; }
    .text-green { color: #16a34a; font-size: 14px; text-align: center; font-weight: bold; margin: 0; }
  </style>
</head>
<body>
  <h1>💼 Job Clipper</h1>

  <!-- ÉCRAN 1 : Connexion -->
  <div id="auth-section" class="flex-col hidden">
    <p class="text-xs">Connectez-vous pour lier l'extension à votre compte.</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Mot de passe" />
    <button id="login-btn">Se connecter</button>
    <p id="auth-error" class="text-red"></p>
  </div>

  <!-- ÉCRAN 2 : Sauvegarde -->
  <div id="app-section" class="flex-col hidden">
    <div class="box" id="job-info">
      <p class="text-xs">Analyse en cours...</p>
    </div>
    <button id="save-btn">Sauvegarder l'offre</button>
    <p id="success-msg" class="text-green hidden">✅ Ajouté au Kanban !</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
